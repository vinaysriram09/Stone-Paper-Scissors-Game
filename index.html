<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Rock Paper Scissors</h1>
    <div class="choices">
        <div class="choice" id="rock">
            <img src="https://abdulahadmansoori.github.io/RockPaperScissor/icons/rock_u.png">
        </div>
        <div class="choice" id="paper">
            <img src="https://abdulahadmansoori.github.io/RockPaperScissor/icons/paper_u.png">
        </div>
        <div class="choice" id="scissors">
            <img src="https://abdulahadmansoori.github.io/RockPaperScissor/icons/scissor_u.png">
        </div>
    </div>

    <div class="score-board">
        <div class="score">
            <p id="user-score">0</p>
            <p>you</p>
        </div>
         <div class="score">
            <p id="comp-score">0</p>
            <p>computer</p>
        </div>
    </div>

    <div class="msg-container">
        <p id="msg">your move</p>
    </div>

    <script src="firstcode.js"></script>
</body>
</html>
